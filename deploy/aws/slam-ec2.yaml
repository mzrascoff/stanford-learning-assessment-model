AWSTemplateFormatVersion: '2010-09-09'
Description: Single-instance AWS deployment for SLAM (API, MCP server, worker, nginx)

Parameters:
  ArtifactBucket:
    Type: String
  ArtifactKey:
    Type: String
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
  DevInstructorToken:
    Type: String
    Default: slam-dev-instructor-token
    NoEcho: true

Resources:
  RuntimeArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: slam-instance-s3-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${ArtifactBucket}
                  - !Sub arn:aws:s3:::${ArtifactBucket}/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RuntimeArtifactBucket.Arn
                  - !Sub ${RuntimeArtifactBucket.Arn}/*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access to SLAM
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: slam-server
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          dnf update -y
          dnf install -y nginx unzip tar gzip
          curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
          dnf install -y nodejs

          mkdir -p /opt/slam /etc/slam /var/lib/slam/data
          aws s3 cp s3://${ArtifactBucket}/${ArtifactKey} /opt/slam/slam-deploy.zip --region ${AWS::Region}
          unzip -o /opt/slam/slam-deploy.zip -d /opt/slam/app

          cd /opt/slam/app
          npm ci --omit=dev

          TOKEN=$(curl -fsSL -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          PUBLIC_IPV4=$(curl -fsSL -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)

          cat >/etc/slam/slam.env <<ENV
          SLAM_API_PORT=4000
          SLAM_MCP_PORT=4100
          SLAM_PUBLIC_BASE_URL=http://$PUBLIC_IPV4
          SLAM_PUBLIC_API_BASE_URL=http://$PUBLIC_IPV4/api
          SLAM_INTERNAL_API_BASE_URL=http://127.0.0.1:4000/api
          SLAM_DATA_DIR=/var/lib/slam/data
          SLAM_SYNC_EVALUATION=false
          SLAM_DEV_INSTRUCTOR_TOKEN=${DevInstructorToken}
          SLAM_ARTIFACT_STORAGE=s3
          SLAM_ARTIFACT_S3_BUCKET=${RuntimeArtifactBucket}
          SLAM_ARTIFACT_S3_KEY_PREFIX=student-artifacts
          ENV

          cat >/etc/systemd/system/slam-api.service <<'UNIT'
          [Unit]
          Description=SLAM API
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile=/etc/slam/slam.env
          WorkingDirectory=/opt/slam/app
          ExecStart=/usr/bin/node /opt/slam/app/apps/api/dist/server.js
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNIT

          cat >/etc/systemd/system/slam-mcp.service <<'UNIT'
          [Unit]
          Description=SLAM MCP Server
          After=network.target slam-api.service

          [Service]
          Type=simple
          EnvironmentFile=/etc/slam/slam.env
          WorkingDirectory=/opt/slam/app
          ExecStart=/usr/bin/node /opt/slam/app/apps/mcp-server/dist/server.js
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNIT

          cat >/etc/systemd/system/slam-worker.service <<'UNIT'
          [Unit]
          Description=SLAM Worker
          After=network.target slam-api.service

          [Service]
          Type=simple
          EnvironmentFile=/etc/slam/slam.env
          WorkingDirectory=/opt/slam/app
          ExecStart=/usr/bin/node /opt/slam/app/apps/worker/dist/worker.js
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          UNIT

          cat >/etc/nginx/conf.d/slam.conf <<'NGINX'
          server {
            listen 80 default_server;
            server_name _;

            location /mcp {
              proxy_pass http://127.0.0.1:4100/mcp;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Connection "";
              proxy_buffering off;
              proxy_request_buffering off;
              chunked_transfer_encoding on;
            }

            location /mcp-health {
              proxy_pass http://127.0.0.1:4100/health;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
            }

            location / {
              proxy_pass http://127.0.0.1:4000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
            }
          }
          NGINX

          rm -f /etc/nginx/conf.d/default.conf || true
          systemctl daemon-reload
          systemctl enable --now slam-api.service slam-mcp.service slam-worker.service nginx

Outputs:
  InstanceId:
    Value: !Ref Instance
  PublicIp:
    Value: !GetAtt Instance.PublicIp
  PublicDnsName:
    Value: !GetAtt Instance.PublicDnsName
  PublicUrl:
    Value: !Sub http://${Instance.PublicIp}
  RuntimeArtifactBucket:
    Value: !Ref RuntimeArtifactBucket
